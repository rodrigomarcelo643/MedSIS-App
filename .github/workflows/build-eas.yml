name: MedSIS EAS Build Pipeline (Cloud)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-eas:
    name: EAS Build (Android & iOS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm ci

      - name: Build Android on EAS (production APK)
        run: eas build --platform android --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS on EAS (simulator - no code signing required)
        run: eas build --platform ios --profile ci --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
