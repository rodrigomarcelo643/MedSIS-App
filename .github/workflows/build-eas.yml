name: MedSIS EAS Build Pipeline (Cloud)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-eas:
    name: EAS Build (Android & iOS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android on EAS
        run: eas build --platform android --profile production --non-interactive --no-wait

      - name: Build iOS on EAS
        run: eas build --platform ios --profile production --non-interactive --no-wait


