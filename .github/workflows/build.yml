name: MedSIS Build Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios

      - name: Patch Podfile - Inject C++17 inside existing post_install block
        run: |
          python3 -c "
          with open('ios/Podfile', 'r') as f:
              content = f.read()

          inject = (
              '  # CI patch: force C++17 to fix fmt/Folly on Xcode 15+\n'
              '  installer.pods_project.targets.each do |target|\n'
              '    target.build_configurations.each do |config|\n'
              '      config.build_settings[\"CLANG_CXX_LANGUAGE_STANDARD\"] = \"c++17\"\n'
              '      config.build_settings[\"CLANG_CXX_LIBRARY\"] = \"libc++\"\n'
              '    end\n'
              '  end\n'
          )

          trigger = 'post_install do |installer|'
          if trigger in content:
              content = content.replace(trigger, trigger + '\n' + inject, 1)
              print('Injected C++17 into existing post_install block')
          else:
              content += '\npost_install do |installer|\n' + inject + 'end\n'
              print('Created new post_install block with C++17 settings')

          with open('ios/Podfile', 'w') as f:
              f.write(content)
          "

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App (Simulator - arm64 only for Apple Silicon runner)
        run: |
          set -o pipefail
          xcodebuild -workspace ios/MSIS.xcworkspace \
                     -scheme MSIS \
                     -sdk iphonesimulator \
                     -configuration Release \
                     -derivedDataPath build \
                     EXCLUDED_ARCHS=x86_64 \
                     ONLY_ACTIVE_ARCH=NO \
                     OTHER_CPLUSPLUSFLAGS='$(inherited) -std=c++17 -stdlib=libc++' \
                     clean build | xcpretty

      - name: Compress iOS App
        run: |
          tar -czf MSIS-Simulator.tar.gz -C build/Build/Products/Release-iphonesimulator MSIS.app

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: MSIS-Simulator.tar.gz
